    /* ============================================================ */

    const pad2 = (n) => String(n).padStart(2, "0");

    function useNow() {
      const [now, setNow] = useState(() => new Date());
      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);
      return now;
    }

    function splitCountdown(ms) {
      const d = Math.max(0, ms);
      return {
        days: Math.floor(d / 86400000),
        hrs: Math.floor((d % 86400000) / 3600000),
        min: Math.floor((d % 3600000) / 60000),
      };
    }

    function Badge({ label }) {
      const t = BADGE_THEMES[label] || { color: "#C8CCCE", bg: "rgba(255,255,255,.05)", border: "rgba(255,255,255,.15)" };
      return (
        <span className="badge" style={{ color: t.color, background: t.bg, borderColor: t.border }}>
          {label}
        </span>
      );
    }

    function WinnerBlock({ w }) {
      return (
        <div className="win">
          <div className="winlab">Winner</div>
          <div className="windrv">{w.driver}</div>
          <div className="winteam">{w.team} · #{w.carNumber}</div>
          <div className="winstats num">
            {w.winningTime != null && (
              <div className="wstat"><span className="k">Time</span><span className="v">{w.winningTime}</span></div>
            )}
            {w.marginSeconds != null && (
              <div className="wstat"><span className="k">Margin</span><span className="v">+{w.marginSeconds.toFixed(3)}s</span></div>
            )}
            {w.fastestLap != null && (
              <div className="wstat"><span className="k">Fastest Lap</span><span className="v">{w.fastestLap}</span></div>
            )}
            {w.laps != null && (
              <div className="wstat"><span className="k">Laps</span><span className="v">{w.laps}</span></div>
            )}
          </div>
          {w.context && (
            <div className="winctx num">{w.context}</div>
          )}
        </div>
      );
    }

    function Countdown({ targetMs, nowMs }) {
      const c = splitCountdown(targetMs - nowMs);
      return (
        <div className="cd num" aria-label="Countdown to lights out">
          <div className="cdu"><span className="v">{pad2(c.days)}</span><span className="k">Days</span></div>
          <div className="cdu"><span className="v">{pad2(c.hrs)}</span><span className="k">Hrs</span></div>
          <div className="cdu"><span className="v">{pad2(c.min)}</span><span className="k">Min</span></div>
        </div>
      );
    }

    function RaceCard({ race, status, nowMs, index }) {
      const winner = WINNERS[race.rd] || null;
      const cls =
        "card" +
        (status === "next" ? " next" : "") +
        (status === "pending" ? " mut" : "");
      return (
        <div className={cls} style={{ "--i": index }}>
          <div className="cr1">
            <div className="rdno num">RD {pad2(race.rd)}</div>
            <div className="flagbox" aria-hidden="true">{race.flag}</div>
            <div className="titlecol">
              <div className="gp">{race.gp}</div>
              <div className="sub">{race.circuit} · {race.loc}</div>
            </div>
            {status === "next" && (
              <div className="statuscell"><span className="chip nextup">Next Up</span></div>
            )}
          </div>

          <div className="when num">
            <span>{race.date}</span>
            <span>·</span>
            <span>{race.time}</span>
            <span className="etchip">ET</span>
            {race.timeNote && <span className="timenote">({race.timeNote})</span>}
          </div>

          {race.badges.length > 0 && (
            <div className="badges">
              {race.badges.map((b) => <Badge key={b} label={b} />)}
            </div>
          )}

          {status === "won" && winner && (
            <WinnerBlock w={winner} />
          )}

          {status === "pending" && (
            <span className="chip pend">Result Pending · StroomHelix Verification</span>
          )}

          {status === "next" && (
            <Countdown targetMs={race.startMs} nowMs={nowMs} />
          )}
        </div>
      );
    }

    function App() {
      const now = useNow();
      const nowMs = now.getTime();
      const [filter, setFilter] = useState("ALL");

      const races = useMemo(
        () => RACES.map((r) => ({ ...r, startMs: Date.parse(r.start) })),
        []
      );

      const done = races.map((r) => nowMs > r.startMs + RACE_WINDOW_MS);
      const completedCount = done.filter(Boolean).length;
      const nextIdx = done.indexOf(false);

      const statusOf = (i) => {
        if (done[i]) return WINNERS[races[i].rd] ? "won" : "pending";
        return i === nextIdx ? "next" : "upcoming";
      };

      const visible = races
        .map((r, i) => ({ race: r, status: statusOf(i), i }))
        .filter(({ race, status }) => {
          if (filter === "COMPLETED") return status === "won" || status === "pending";
          if (filter === "UPCOMING") return status === "next" || status === "upcoming";
          if (filter === "SPRINT") return race.badges.indexOf("SPRINT") !== -1;
          return true;
        });

      let stripNext = "SEASON COMPLETE";
      if (nextIdx !== -1) {
        const c = splitCountdown(races[nextIdx].startMs - nowMs);
        stripNext = "NEXT: " + races[nextIdx].gp.toUpperCase() + " IN " +
          pad2(c.days) + "D " + pad2(c.hrs) + "H " + pad2(c.min) + "M";
      }

      return (
        <React.Fragment>
          <style>{CSS}</style>
          <div className="page">
            <header className="hd">
              <div className="hd-row">
                <div className="wordmark">STROOM<span className="ghost">RACING</span></div>
                <div className="hd-title">F1 2026 Race Calendar</div>
                <div className="hd-right">Dark · Live</div>
              </div>
              <div className="strip num">
                22 ROUNDS <span className="acc">·</span> {completedCount} COMPLETE <span className="acc">·</span> {stripNext}
              </div>
              <div className="broadcast">{BROADCAST}</div>
            </header>

            <nav className="filters" aria-label="Filter rounds">
              {["ALL", "COMPLETED", "UPCOMING", "SPRINT"].map((f) => (
                <button
                  key={f}
                  className={"ftab" + (filter === f ? " active" : "")}
                  onClick={() => setFilter(f)}
                >
                  {f}
                </button>
              ))}
            </nav>

            <main className="tl">
              <div className="tl-line" aria-hidden="true"></div>
              {visible.map(({ race, status, i }, renderIdx) => (
                <div className="row" key={race.rd}>
                  <div className="rail" aria-hidden="true">
                    <div className={
                      "dot" +
                      (status === "won" || status === "pending" ? " done" : "") +
                      (status === "next" ? " next" : "")
                    }></div>
                  </div>
                  <RaceCard race={race} status={status} nowMs={nowMs} index={renderIdx} />
                </div>
              ))}
            </main>

            <section className="note">
              <span className="lbl">Season Notes</span>
              {SEASON_NOTE}
            </section>

            <footer className="foot">
              <div>Fastest trusted updates · stroomracing.com</div>
              <div>Every claim sourced · Every correction logged</div>
              <div>data powered by StroomHelix</div>
            </footer>
          </div>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
